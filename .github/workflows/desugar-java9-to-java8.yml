name: Desugar Java 9 → Java 8

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      input_jar:
        description: 'Release asset name of the Java 9 JAR to desugar'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # ── 1. Build the desugarer tool itself ──────────────────────────────────────
  build-desugarer:
    name: Build desugarer tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8 (for compilation target)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # Compile the j9compat backport library (pure Java 8 code)
      - name: Compile j9compat backport library
        run: |
          mkdir -p build/backport
          javac -source 8 -target 8 \
            -cp asm-9.4.jar:asm-commons-9.4.jar:asm-tree-9.4.jar \
            -d build/backport \
            src/j9compat/*.java

      # Compile the desugarer tool itself (also Java 8 target)
      - name: Compile desugarer tool
        run: |
          mkdir -p build/desugarer
          javac -source 8 -target 8 \
            -cp asm-9.4.jar:asm-commons-9.4.jar:asm-tree-9.4.jar \
            -d build/desugarer \
            src/desugarer/*.java

      # Package everything into a single fat JAR
      - name: Package desugarer fat JAR
        run: |
          mkdir -p build/fatjar
          # Unpack ASM jars
          cd build/fatjar
          jar xf ../../asm-9.4.jar
          jar xf ../../asm-commons-9.4.jar
          jar xf ../../asm-tree-9.4.jar
          # Copy compiled classes
          cp -r ../desugarer/* .
          # Build fat JAR
          cd ../..
          jar cfe build/desugar9to8.jar desugarer.Java9ToJava8Desugarer \
            -C build/fatjar .

      - name: Upload desugarer JAR
        uses: actions/upload-artifact@v4
        with:
          name: desugar9to8-tool
          path: |
            build/desugar9to8.jar
            build/backport/

  # ── 2. Run backport unit tests ────────────────────────────────────────────
  test-backport:
    name: Run j9compat backport unit tests
    needs: build-desugarer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Download desugarer artifact
        uses: actions/download-artifact@v4
        with:
          name: desugar9to8-tool
          path: build/

      - name: Compile j9compat backport library
        run: |
          mkdir -p build/backport
          javac -source 8 -target 8 \
            -cp asm-9.4.jar:asm-commons-9.4.jar:asm-tree-9.4.jar \
            -d build/backport \
            src/j9compat/*.java

      - name: Compile desugarer tool
        run: |
          mkdir -p build/desugarer
          javac -source 8 -target 8 \
            -cp asm-9.4.jar:asm-commons-9.4.jar:asm-tree-9.4.jar \
            -d build/desugarer \
            src/desugarer/*.java

      - name: Compile backport unit tests
        run: |
          mkdir -p build/test
          javac -source 8 -target 8 \
            -cp build/backport:build/desugarer \
            -d build/test \
            src/test/*.java

      - name: Run backport unit tests
        run: |
          java -cp build/backport:build/desugarer:build/test test.BackportTestRunner

  # ── 3. Self-test: desugar the tool's own classes ────────────────────────────
  self-test:
    name: Self-test (desugar the desugarer itself)
    needs: [build-desugarer, test-backport]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11 (for Java 9-11 sample compilation)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Download desugarer artifact
        uses: actions/download-artifact@v4
        with:
          name: desugar9to8-tool
          path: build/

      - name: Compile j9compat backport library
        run: |
          mkdir -p build/backport
          javac -source 8 -target 8 \
            -cp asm-9.4.jar:asm-commons-9.4.jar:asm-tree-9.4.jar \
            -d build/backport \
            src/j9compat/*.java

      - name: Create Java 9-11 sample program JARs
        run: |
          for release in 9 10 11; do
            mkdir -p "/tmp/java${release}sample/com/example" "/tmp/java${release}sample/classes"
          done

          cat > /tmp/java9sample/com/example/Java9FeaturesSample.java << 'JAVA'
          package com.example;

          import java.util.List;
          import java.util.Optional;
          import java.util.stream.Stream;

          public class Java9FeaturesSample {
              public static void main(String[] args) {
                  List<String> names = List.of("Alice", "Bob");
                  long positive = Stream.of(5, 4, -1).takeWhile(n -> n > 0).count();
                  StringBuilder marker = new StringBuilder();
                  Optional.<String>empty().ifPresentOrElse(
                      marker::append,
                      () -> marker.append("empty")
                  );
                  System.out.println(names.size() + ":" + positive + ":" + marker);
              }
          }
          JAVA

          cat > /tmp/java10sample/com/example/Java10FeaturesSample.java << 'JAVA'
          package com.example;

          import java.util.Arrays;
          import java.util.List;
          import java.util.Optional;
          import java.util.stream.Collectors;
          import java.util.stream.Stream;

          public class Java10FeaturesSample {
              public static void main(String[] args) {
                  List<String> copied = List.copyOf(Arrays.asList("x", "y", "x"));
                  List<String> unmodifiable = Stream.of("left", "right")
                      .collect(Collectors.toUnmodifiableList());
                  String value = Optional.of("v").orElseThrow();
                  System.out.println(copied.get(0) + ":" + unmodifiable.size() + ":" + value);
              }
          }
          JAVA

          cat > /tmp/java11sample/com/example/Java11FeaturesSample.java << 'JAVA'
          package com.example;

          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.util.function.Predicate;
          import java.util.stream.Stream;

          public class Java11FeaturesSample {
              public static void main(String[] args) throws Exception {
                  Path tempDir = Path.of(System.getProperty("java.io.tmpdir"));
                  Path file = Files.createTempFile(tempDir, "java11program", ".txt");
                  Files.writeString(file, "  hi  ");
                  String text = Files.readString(file);
                  String stripped = text.strip();
                  boolean blank = " \n\t".isBlank();
                  long nonBlank = Stream.of("a", "", "b")
                      .filter(Predicate.not(String::isBlank))
                      .count();
                  System.out.println(stripped + ":" + blank + ":" + nonBlank + ":" + "ha".repeat(2));
                  Files.deleteIfExists(file);
              }
          }
          JAVA

          for release in 9 10 11; do
            javac --release "$release" \
              -d "/tmp/java${release}sample/classes" \
              "/tmp/java${release}sample/com/example/Java${release}FeaturesSample.java"
            jar cf "/tmp/java${release}sample/java${release}sample.jar" \
              -C "/tmp/java${release}sample/classes" .
          done

      - name: Run desugarer on Java 9-11 sample JARs
        run: |
          for release in 9 10 11; do
            java -jar build/desugar9to8.jar \
              "/tmp/java${release}sample/java${release}sample.jar" \
              "/tmp/java${release}sample/java8out.jar" \
              build/backport
          done

      - name: Verify Java 9-11 outputs are Java 8 class files
        run: |
          for release in 9 10 11; do
            echo "Checking class version for Java ${release} sample"
            javap -verbose -classpath "/tmp/java${release}sample/java8out.jar" "com.example.Java${release}FeaturesSample" | grep "major version: 52"
          done

      - name: Set up Java 8 runtime
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Run desugared Java 9-11 programs on Java 8
        run: |
          java -cp /tmp/java9sample/java8out.jar com.example.Java9FeaturesSample | tee /tmp/java9sample/output.txt
          grep -Fx "2:2:empty" /tmp/java9sample/output.txt

          java -cp /tmp/java10sample/java8out.jar com.example.Java10FeaturesSample | tee /tmp/java10sample/output.txt
          grep -Fx "x:2:v" /tmp/java10sample/output.txt

          java -cp /tmp/java11sample/java8out.jar com.example.Java11FeaturesSample | tee /tmp/java11sample/output.txt
          grep -Fx "hi:true:2:haha" /tmp/java11sample/output.txt

      - name: Upload desugared output
        uses: actions/upload-artifact@v4
        with:
          name: java8-output-sample
          path: |
            /tmp/java9sample/java8out.jar
            /tmp/java10sample/java8out.jar
            /tmp/java11sample/java8out.jar

  # ── 4. (Optional) Desugar a JAR from a release asset ───────────────────────
  desugar-release-jar:
    name: Desugar release JAR
    needs: [build-desugarer, test-backport]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.input_jar != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Download desugarer artifact
        uses: actions/download-artifact@v4
        with:
          name: desugar9to8-tool
          path: build/

      - name: Download input JAR from latest release
        run: |
          INPUT_JAR="${{ github.event.inputs.input_jar }}"
          curl -L -o input.jar \
            "https://github.com/${{ github.repository }}/releases/latest/download/${INPUT_JAR}"
          echo "Downloaded: $(ls -lh input.jar)"

      - name: Compile j9compat backport library
        run: |
          mkdir -p build/backport
          javac -source 8 -target 8 \
            -cp asm-9.4.jar:asm-commons-9.4.jar:asm-tree-9.4.jar \
            -d build/backport \
            src/j9compat/CollectionBackport.java \
            src/j9compat/StreamBackport.java \
            src/j9compat/OptionalBackport.java \
            src/j9compat/IOBackport.java \
            src/j9compat/ObjectsBackport.java \
            src/j9compat/CompletableFutureBackport.java

      - name: Run desugarer
        run: |
          java -jar build/desugar9to8.jar \
            input.jar \
            output-java8.jar \
            build/backport

      - name: Show desugaring summary
        run: |
          echo "Input  size : $(du -sh input.jar       | cut -f1)"
          echo "Output size : $(du -sh output-java8.jar | cut -f1)"
          echo ""
          echo "Output JAR contents (first 30 entries):"
          jar tf output-java8.jar | head -30

      - name: Upload desugared JAR
        uses: actions/upload-artifact@v4
        with:
          name: desugared-java8-jar
          path: output-java8.jar
